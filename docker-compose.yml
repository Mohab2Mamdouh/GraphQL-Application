services:
  app:
    build:
      context: .
      args:
        UID: ${UID:-1000}
        GID: ${GID:-1000}
    container_name: graphql-app
    user: "${UID:-1000}:${GID:-1000}"
    volumes:
      - .:/var/www
    networks:
      - albaraka

  nginx:
    image: nginx:alpine
    container_name: graphql-nginx
    ports:
      - "${APP_PORT:-8000}:80"
    volumes:
      - .:/var/www
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - albaraka

networks:
  albaraka:
    external: true
    name: albaraka-insfund_albaraka

